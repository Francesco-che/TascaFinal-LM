<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de actividades</title>
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="contenedor">
        <aside class="barra-lateral">
            <h2 class="barra-lateral-titulo">Menú</h2>
            <a href="index.html"><button>Lista de actividades</button></a>
            <a href="crear-tasca.html"><button>Crear tarea</button></a>
            <a href="categories.html"><button>Gestión de categorias</button></a>
        </aside>
        <main class="contenido-principal">
            <h1>Lista de actividades</h1>
            <div class="index-container-archivos">
                <a href="crear-tasca.html">
                <button class="blue-button">Crear nueva tarea</button>
                </a>
                <div class="form-div2">
                    <select id="select-archivo">
                        <option value="activitats_001.json">activitats_001.json</option>
                        <option value="activitats_002.json">activitats_002.json</option>
                        <option value="activitats_003.xml">activitats_003.xml</option>
                        <option value="activitats_004.xml">activitats_004.xml</option>
                    </select>
                    <button class="blue-button" id="btn-subir" type="button">subir</button>
                </div>
            </div>

            <div class="index-container-tareas">
                <div class="columna-tareas">
                    <h2>Tareas Pendientes</h2>
                    <div id="lista-pendientes"></div>
                </div>
                <div class="columna-tareas">
                    <h2>Tareas Acabadas</h2>
                    <div id="lista-acabadas"></div>
                </div>
            
            </div>

            <div class="grafico-container">
                <canvas id="graficoTareas"></canvas>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="js/index.js" type="module"></script>
    <script src="js/grafics.js" type="module"></script>
</body>
</html>
