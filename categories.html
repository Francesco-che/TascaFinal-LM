<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de categorias</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="contenedor">
        <aside class="barra-lateral">
            <h2 class="barra-lateral-titulo">Menú</h2>
            <div>Lista de actividades</div>
            <div>Crear tarea</div>
            <div>Gestión de categorias</div>
        </aside>
        <main class="contenido-principal">
            <h1>Gestión de categorias</h1>
            <div>
                <label for="categoria">Nueva Categoria:</label>
                <input type="text" id="categoria">

                <label for="colorPicker">Color de la categoria:</label>
                <input type="color" id="colorPicker" name="colorPicker" value="#ff0000">

                <button class="blue-button" type="submit">Añadir categoria</button>
            </div>
        </main>
    </div>
</body>
</html>
