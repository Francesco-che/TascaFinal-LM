<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Tarea</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="contenedor">
        <aside class="barra-lateral">
            <h2 class="barra-lateral-titulo">Menú</h2>
            <a href="index.html"><button>Lista de actividades</button></a>
            <a href="crear-tasca.html"><button>Crear tarea</button></a>
            <a href="categories.html"><button>Gestión de categorias</button></a>
        </aside>
        <main class="contenido-principal">
            <h1>Crear nueva tarea</h1>
            <div class="categorias-form-container">
                <div class="form-div">
                    <label for="title">Título</label>
                    <input type="text" id="title">
                </div>
                <div class="form-div">
                    <label for="description">Descripción:</label>
                    <textarea id="description" name="description" rows="4" cols="50"></textarea>
                </div>
                <div class="form-div">
                    <label for="date">Fecha:</label>
                    <input type="date" id="date">
                </div>
                <div class="form-div">
                    <label for="category">Categoría:</label>
                    <select name="category" id="category">
                        <option value=""></option>
                    </select>
                </div>
                <div class="form-div">
                    <label for="priority">Prioridad:</label>
                    <select name="priority" id="priority">
                        <option value="baja">Baja</option>
                        <option value="media">Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
                <button class="blue-button" id="btn-crearTarea">Crear Tarea</button>
            </div>
        </main>
    </div>
</body>
</html>
